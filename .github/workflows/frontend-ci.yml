name: Site CI

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/frontend-ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vercel.json'
      - 'app/**'
      - 'components/**'
      - 'data/**'
      - 'hooks/**'
      - 'lib/**'
      - 'public/**'
      - 'scripts/**'
      - 'styles/**'
      - 'tests/**'
      - 'tsconfig.json'
      - 'next.config.mjs'
      - 'postcss.config.mjs'
      - 'tailwind.config.ts'
      - 'eslint.config.mjs'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/frontend-ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vercel.json'
      - 'app/**'
      - 'components/**'
      - 'data/**'
      - 'hooks/**'
      - 'lib/**'
      - 'public/**'
      - 'scripts/**'
      - 'styles/**'
      - 'tests/**'
      - 'tsconfig.json'
      - 'next.config.mjs'
      - 'postcss.config.mjs'
      - 'tailwind.config.ts'
      - 'eslint.config.mjs'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'

concurrency:
  group: site-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
